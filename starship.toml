"$schema" = 'https://starship.rs/config-schema.json'

# ////////////////////////////////////////////////
# FORMAT
# ////////////////////////////////////////////////

format = """
$os\
[î‚¼](fg:black bg:blue)\
$hostname\
$localip\
[î‚¼](fg:blue bg:purple)\
$username\
[î‚¼](fg:purple bg:yellow)\
$shell\
$shlvl\
$sudo\
[î‚¼](fg:yellow bg:green)\
$git_branch\
$git_status\
$package\
$docker_context\
[î‚¼](fg:green bg:red)\
$julia\
$python\
${custom.wolfram}\
[î‚¼](fg:red bg:black)\
