right_format = """$cmd_duration"""

# Adds a single blank line ABOVE the prompt so commands don't blur together
add_newline = true

# ////////////////////////////////////////////////
# MODULES
# ////////////////////////////////////////////////

[line_break]
disabled = false

[character]
disabled = false
# Reduced to a single space for normal proportions
format = "$symbol " 
success_symbol = '[:](bold fg:white)' 
error_symbol = '[:](bold fg:red)'
vimcmd_symbol = '[ïگ´](bold fg:white)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:purple)'
vimcmd_replace_symbol = '[ïگ´](bold fg:purple)'
vimcmd_visual_symbol = '[ïگ´](bold fg:yellow)'

[os]
disabled = false
style = "fg:white bg:black"
format = "[$symbol]($style)"
symbols = { Arch = "ïŒƒ ", Unknown = "î©± " } 

[time]
disabled = true

[hostname]
disabled = false
ssh_only = false
ssh_symbol =  " َ±ک– " 
style = "fg:black bg:blue"
format = '[$ssh_symbol]($style)[ َ°چ¹  $hostname ]($style)'

[localip]
disabled = false
ssh_only = true
style = "fg:black bg:blue"
format = '[ َ°©ں $localipv4 ]($style)'

[username]
disabled = false
show_always = true
style_user = "fg:black bg:purple"
style_root = "fg:black bg:purple"
format = '[ î·ˆ ]($style)[ $user ]($style)'
 
[shell]
disabled = false
fish_indicator = ""
bash_indicator = " î‍• bash "
unknown_indicator = " î‍• shell "
style = "fg:black bg:yellow"
format = "[$indicator]($style)"

[shlvl]
disabled = false
threshold = 2
symbol = 'ïپ½'
style = "fg:black bg:yellow"
format = "[ $symbol $shlvl ]($style)"

[sudo]
disabled = false
symbol = 'َ°Œ† ' 
style = "fg:black bg:yellow"
format = '[ $symbol ]($style)'

[git_branch]
symbol = "َ°ک¬"
style = "fg:black bg:green"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold fg:red bg:green"
format = '[$all_status$ahead_behind ]($style)'

[package]
format = '[ ï’‡ $version ](fg:black bg:green)'

[docker_context]
only_with_files = true
symbol = "ïŒˆ"
style = "fg:black bg:green"
format = '[ $symbol( $context) ]($style)'

# --- Scientific Workflow ---

[julia]
symbol = "à®ƒ "
style = "bold fg:white bg:red"
format = '[ $symbol$version ]($style)'

[python]
symbol = "ًںگچ "
style = "bold fg:white bg:red"
format = '[ $symbol$version ]($style)'

[custom.wolfram]
detect_extensions = ["wl", "wls", "nb", "m"]
symbol = "ًںگ؛ "
style = "bold fg:white bg:red"
command = "wolfram -version" 
format = '[ $symbol$output ]($style)'

# ---------------------------

[directory]
truncation_length = 5
truncation_symbol = "../"
home_symbol = "~" 
read_only = " î™² "
read_only_style = "fg:red bg:black"
style = "bold fg:white bg:black"
format = "[ َ°‰‹ ]($style)[$read_only]($read_only_style)[ $path ]($style)"

[cmd_duration]
disabled = false
style = "fg:yellow"
format = "[ â—„ $duration ]($style)"
min_time = 500