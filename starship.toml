"$schema" = 'https://starship.rs/config-schema.json'

# ////////////////////////////////////////////////
# FORMAT
# ////////////////////////////////////////////////

format = """
$os\
[Óāľ](fg:black bg:blue)\
$hostname\
$localip\
[Óāľ](fg:blue bg:purple)\
$username\
[Óāľ](fg:purple bg:yellow)\
$shell\
$shlvl\
$sudo\
[Óāľ](fg:yellow bg:green)\
$git_branch\
$git_status\
$package\
$docker_context\
[Óāľ](fg:green bg:red)\
$julia\
$python\
${custom.wolfram}\
[Óāľ](fg:red bg:black)\
$directory\
[Óāľ](fg:black)\
$line_break\
$character\
"""

right_format = """$cmd_duration$time"""

# Adds a single blank line ABOVE the prompt so commands don't blur together
add_newline = true

# ////////////////////////////////////////////////
# MODULES
# ////////////////////////////////////////////////

[line_break]
disabled = false

[character]
disabled = false
# Reduced to a single space for normal proportions
format = "$symbol " 
success_symbol = '[:](bold fg:white)' 
error_symbol = '[:](bold fg:red)'
vimcmd_symbol = '[Ôźī](bold fg:white)'
vimcmd_replace_one_symbol = '[Ôźī](bold fg:purple)'
vimcmd_replace_symbol = '[Ôźī](bold fg:purple)'
vimcmd_visual_symbol = '[Ôźī](bold fg:yellow)'

[os]
disabled = false
style = "fg:white bg:black"
format = "[$symbol]($style)"
symbols = { Arch = "ÔĆÉ ", Unknown = "Ó©Ī " } 

[time]
disabled = false
style = "fg:white"
# %R shows time in 24-hour format (HH:MM). Use %r for 12-hour (HH:MM:SS AM/PM) or %T for 24-hour with seconds.
time_format = "%R"
format = "[ Ôźļ $time ]($style)"

[hostname]
disabled = false
ssh_only = false
ssh_symbol =  " ůĪėĖ " 
style = "fg:black bg:blue"
format = '[$ssh_symbol]($style)[ ůįćĻ  $hostname ]($style)'

[localip]
disabled = false
ssh_only = true
style = "fg:black bg:blue"
format = '[ ůį©ü $localipv4 ]($style)'

[username]
disabled = false
show_always = true
style_user = "fg:black bg:purple"
style_root = "fg:black bg:purple"
format = '[ Ó∑ą ]($style)[ $user ]($style)'
 
[shell]
disabled = false
fish_indicator = ""
bash_indicator = " Óěē bash "
unknown_indicator = " Óěē shell "
style = "fg:black bg:yellow"
format = "[$indicator]($style)"

[shlvl]
disabled = false
threshold = 2
symbol = 'ÔĀĹ'
style = "fg:black bg:yellow"
format = "[ $symbol $shlvl ]($style)"

[sudo]
disabled = false
symbol = 'ůįĆÜ ' 
style = "fg:black bg:yellow"
format = '[ $symbol ]($style)'

[git_branch]
symbol = "ůįė¨"
style = "fg:black bg:green"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold fg:red bg:green"
format = '[$all_status$ahead_behind ]($style)'

[package]
format = '[ Ôíá $version ](fg:black bg:green)'

[docker_context]
only_with_files = true
symbol = "ÔĆą"
style = "fg:black bg:green"
format = '[ $symbol( $context) ]($style)'

# --- Scientific Workflow ---

[julia]
symbol = "ŗģÉ "
style = "bold fg:white bg:red"
format = '[ $symbol$version ]($style)'

[python]
symbol = "ūüźć "
style = "bold fg:white bg:red"
format = '[ $symbol$version ]($style)'

[custom.wolfram]
detect_extensions = ["wl", "wls", "nb", "m"]
symbol = "ūüźļ "
style = "bold fg:white bg:red"
command = "wolfram -version" 
format = '[ $symbol$output ]($style)'

# ---------------------------

[directory]
truncation_length = 5
truncation_symbol = "../"
home_symbol = "~" 
read_only = " Óô≤ "
read_only_style = "fg:red bg:black"
style = "bold fg:white bg:black"
format = "[ ůįČč ]($style)[$read_only]($read_only_style)[ $path ]($style)"

[cmd_duration]
disabled = false
style = "fg:yellow"
format = "[ ‚óĄ $duration ]($style)"
min_time = 500